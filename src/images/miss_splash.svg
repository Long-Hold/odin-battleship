<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="splashCenter" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#a8e6ff"/>
      <stop offset="100%" stop-color="#0077bb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dropGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#d0f4ff"/>
      <stop offset="100%" stop-color="#0099dd"/>
    </radialGradient>
  </defs>

  <!-- Outer ripple ring -->
  <ellipse cx="50" cy="72" rx="38" ry="10"
    fill="none"
    stroke="#0099dd"
    stroke-width="2"
    stroke-opacity="0.35"
  />

  <!-- Mid ripple ring -->
  <ellipse cx="50" cy="72" rx="27" ry="7"
    fill="none"
    stroke="#0099dd"
    stroke-width="2"
    stroke-opacity="0.55"
  />

  <!-- Inner ripple / impact ring -->
  <ellipse cx="50" cy="72" rx="15" ry="4"
    fill="none"
    stroke="#00bbff"
    stroke-width="2.5"
    stroke-opacity="0.8"
  />

  <!-- Central impact glow -->
  <ellipse cx="50" cy="72" rx="12" ry="3" fill="url(#splashCenter)" opacity="0.7"/>

  <!-- Left spray arm -->
  <path d="M 50 68 Q 28 54 18 40" fill="none" stroke="#55ccff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- Left spray droplet -->
  <ellipse cx="17" cy="38" rx="3.5" ry="4.5" fill="url(#dropGrad)" transform="rotate(-20, 17, 38)"/>

  <!-- Right spray arm -->
  <path d="M 50 68 Q 72 54 82 40" fill="none" stroke="#55ccff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- Right spray droplet -->
  <ellipse cx="83" cy="38" rx="3.5" ry="4.5" fill="url(#dropGrad)" transform="rotate(20, 83, 38)"/>

  <!-- Center spray arm (tall) -->
  <path d="M 50 68 Q 50 45 50 22" fill="none" stroke="#55ccff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- Center droplet -->
  <ellipse cx="50" cy="19" rx="3.5" ry="5" fill="url(#dropGrad)"/>

  <!-- Left-center spray -->
  <path d="M 50 68 Q 37 50 30 30" fill="none" stroke="#88ddff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="29" cy="27" rx="2.5" ry="3.5" fill="url(#dropGrad)" transform="rotate(-10, 29, 27)"/>

  <!-- Right-center spray -->
  <path d="M 50 68 Q 63 50 70 30" fill="none" stroke="#88ddff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="71" cy="27" rx="2.5" ry="3.5" fill="url(#dropGrad)" transform="rotate(10, 71, 27)"/>

  <!-- Small scattered droplets -->
  <circle cx="22" cy="58" r="2" fill="#55ccff" opacity="0.75"/>
  <circle cx="78" cy="58" r="2" fill="#55ccff" opacity="0.75"/>
  <circle cx="38" cy="44" r="1.5" fill="#aaeeff" opacity="0.8"/>
  <circle cx="62" cy="44" r="1.5" fill="#aaeeff" opacity="0.8"/>
  <circle cx="43" cy="30" r="1.5" fill="#aaeeff" opacity="0.7"/>
  <circle cx="57" cy="30" r="1.5" fill="#aaeeff" opacity="0.7"/>
</svg>
