<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle Ship</title>
  </head>
  <body>
    <header>
      <h1>Battleship</h1>
    </header>
    <section id="game-grids-container">
      <div class="game-grid">
        <h2>ALLIED WATERS</h2>
        <div class="grid-plane">
          <div class="grid-letters"></div>
          <div class="grid-numbers"></div>
          <div class="grid-squares"></div>
        </div>
      </div>
      <div class="game-grid">
        <h2>ENEMY WATERS</h2>
        <div class="grid-plane">
          <div class="grid-letters"></div>
          <div class="grid-numbers"></div>
          <div class="grid-squares"></div>
        </div>
      </div>
    </section>
    <section id="game-buttons">
      <button type="button" class="game-button" id="randomize-ships">Randomize Ships</button>
      <button type="button" class="game-button hidden" id="start-game">Start Game</button>
      <button type="button" class="game-button hidden" id="play-again">Play Again</button>
    </section>
  </body>
</html>
